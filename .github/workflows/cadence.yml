name: Update Availability Data

on:
  schedule:
    # Every 2 hours at :16 from 8 AM to 10 PM
    - cron: '16 8-22/2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch availability
        run: ./bin/linux_amd64/scheduler --json-out site/public/availability.json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update availability data"
          file_pattern: site/public/availability.json
