name: Update Availability Data

on:
  schedule:
    # Every hour from 6 AM to midnight Central time.
    # Covers both CST (UTC-6) and CDT (UTC-5) year-round:
    #   6 AM CDT = 11:00 UTC, midnight CDT = 05:00 UTC
    #   6 AM CST = 12:00 UTC, midnight CST = 06:00 UTC
    - cron: '0 11-23 * * *'
    - cron: '0 0-6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git identity
        run: |
          git config user.email "noreply@github.com"
          git config user.name "GitHub Actions"

      - name: Fetch availability
        run: ./bin/linux_amd64/scheduler --json-out availability.json --out README.md

      - name: Commit changes
        run: |
          git add availability.json README.md
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update availability data" && git push origin main)
